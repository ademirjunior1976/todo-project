# ============================================================
# application.properties - Bilca Systems Todo List
# ============================================================

# Servidor
server.port=${PORT:8080}

# PostgreSQL DataSource
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/todolist}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Flyway desabilitado localmente — habilitar em produção via env var FLYWAY_ENABLED=true
spring.flyway.enabled=${FLYWAY_ENABLED:false}

# Thymeleaf
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8
