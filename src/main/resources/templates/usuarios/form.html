<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title th:text="${usuarioForm.id != null} ? 'Editar Usuário' : 'Novo Usuário'">Usuário</title></head>
<body>
<main layout:fragment="content">

    <div class="page-header">
        <div>
            <h1 class="page-title" th:text="${usuarioForm.id != null} ? 'Editar Usuário' : 'Novo Usuário'">Usuário</h1>
            <p class="page-subtitle">
                <a th:href="@{/}" class="breadcrumb">Dashboard</a>
                <span> › </span>
                <a th:href="@{/usuarios}" class="breadcrumb">Usuários</a>
            </p>
        </div>
        <a th:href="@{/usuarios}" class="btn btn--ghost">← Voltar</a>
    </div>

    <div class="form-card">
        <form th:action="@{/usuarios/salvar}" th:object="${usuarioForm}" method="post" novalidate>
            <input type="hidden" th:field="*{id}"/>
            <input type="hidden" th:field="*{dataCriacao}"/>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="nome">Nome completo <span class="required">*</span></label>
                    <input type="text" id="nome" th:field="*{nome}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('nome')} ? ' is-invalid'"
                           placeholder="Nome do usuário"/>
                    <span class="form-error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
                </div>
                <div class="form-group">
                    <label class="form-label" for="username">
                        Login <span class="required">*</span>
                    </label>
                    <input type="text" id="username" th:field="*{username}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('username')} ? ' is-invalid'"
                           th:readonly="${usuarioForm.id != null}"
                           placeholder="Nome de usuário para login"/>
                    <span class="form-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
                    <span class="form-hint" th:if="${usuarioForm.id != null}">O login não pode ser alterado</span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="senha">
                        Senha
                        <span class="required" th:if="${usuarioForm.id == null}">*</span>
                    </label>
                    <input type="password" id="senha" name="senha"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'"
                           placeholder="Digite a senha"/>
                    <span class="form-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
                    <span class="form-hint" th:if="${usuarioForm.id != null}">Deixe em branco para manter a senha atual</span>
                </div>
                <div class="form-group" th:if="${usuarioForm.id != null}">
                    <label class="form-label">Status</label>
                    <div style="display:flex;align-items:center;gap:.75rem;padding:.6rem 0">
                        <input type="checkbox" id="ativo" th:field="*{ativo}" style="width:16px;height:16px;cursor:pointer"/>
                        <label for="ativo" style="font-size:.875rem;color:var(--gray-800);cursor:pointer;margin:0">Usuário ativo</label>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn--primary">💾 Salvar</button>
                <a th:href="@{/usuarios}" class="btn btn--ghost">Cancelar</a>
            </div>
        </form>
    </div>

</main>
</body>
</html>
