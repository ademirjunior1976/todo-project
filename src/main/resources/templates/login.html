<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - Bilca Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--gray-50);
        }
        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 1.5rem;
        }
        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .6rem;
            margin-bottom: 2rem;
            color: var(--blue);
            font-size: 1.4rem;
            font-weight: 700;
        }
        .login-brand__icon {
            background: var(--blue);
            color: var(--white);
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        .login-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 2rem;
        }
        .login-card__title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: .25rem;
        }
        .login-card__subtitle {
            font-size: .83rem;
            color: var(--gray-400);
            margin-bottom: 1.75rem;
        }
        .login-footer {
            text-align: center;
            font-size: .78rem;
            color: var(--gray-400);
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
<div class="login-wrapper">

    <div class="login-brand">
        <div class="login-brand__icon">✓</div>
        <span>Bilca Systems</span>
    </div>

    <div class="login-card">
        <h1 class="login-card__title">Entrar</h1>
        <p class="login-card__subtitle">Acesse sua conta para gerenciar as tarefas</p>

        <div th:if="${erro}" class="alert" style="background:var(--red-light);color:var(--red);border-left:4px solid var(--red);margin-bottom:1.25rem;padding:.8rem 1.1rem;border-radius:var(--radius-sm);font-size:.875rem;font-weight:500;">
            Usuário ou senha inválidos.
        </div>
        <div th:if="${param.logout}" class="alert alert--success">
            Você saiu com sucesso.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label class="form-label" for="username">Usuário</label>
                <input type="text" id="username" name="username"
                       class="form-control"
                       placeholder="Digite seu usuário"
                       autofocus required/>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Senha</label>
                <input type="password" id="password" name="password"
                       class="form-control"
                       placeholder="Digite sua senha"
                       required/>
            </div>
            <div class="form-actions" style="border-top:none;padding-top:0;margin-top:1.25rem">
                <button type="submit" class="btn btn--primary" style="width:100%;justify-content:center;">
                    Entrar
                </button>
            </div>
        </form>
    </div>

    <div class="login-footer">© 2025 Bilca Systems</div>
</div>
</body>
</html>
