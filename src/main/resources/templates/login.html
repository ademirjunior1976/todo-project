<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - Bilca Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--gray-50);
        }
        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 1.5rem;
        }
        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .6rem;
            margin-bottom: 2rem;
            color: var(--blue);
            font-size: 1.4rem;
            font-weight: 700;
        }
        .login-brand__icon {
            background: var(--blue);
            color: var(--white);
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        .login-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 2rem;
        }
        .login-card__title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: .25rem;
        }
        .login-card__subtitle {
            font-size: .83rem;
            color: var(--gray-400);
            margin-bottom: 1.75rem;
        }
        .login-footer {
            text-align: center;
            font-size: .78rem;
            color: var(--gray-400);
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
<div class="login-wrapper">

    <div class="login-brand bilca-about">
        <img th:src="@{/bilca-logo.png}" alt="Bilca" style="width:38px;height:38px;object-fit:contain;border-radius:8px;background:white;padding:4px;"/>
        <span>Bilca Systems</span>
    </div>

    <div class="login-card">
        <h1 class="login-card__title">Entrar</h1>
        <p class="login-card__subtitle">Acesse sua conta para gerenciar as tarefas</p>

        <div th:if="${erro}" class="alert" style="background:var(--red-light);color:var(--red);border-left:4px solid var(--red);margin-bottom:1.25rem;padding:.8rem 1.1rem;border-radius:var(--radius-sm);font-size:.875rem;font-weight:500;">
            Usuário ou senha inválidos.
        </div>
        <div th:if="${param.logout}" class="alert alert--success">
            Você saiu com sucesso.
        </div>
        <div th:if="${sucesso}" class="alert alert--success" th:text="${sucesso}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-group form-group--float">
                <input type="text" id="username" name="username"
                       class="form-control"
                       placeholder=" "
                       autofocus required/>
                <label class="form-label" for="username">Usuário</label>
            </div>
            <div class="form-group form-group--float">
                <div class="pwd-wrapper">
                    <input type="password" id="password" name="password"
                           class="form-control"
                           placeholder=" "
                           required/>
                    <button type="button" class="pwd-toggle" aria-label="Mostrar senha">
                        <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                <label class="form-label" for="password">Senha</label>
            </div>
            <div class="form-actions" style="border-top:none;padding-top:0;margin-top:1.25rem">
                <button type="submit" class="btn btn--primary" style="width:100%;justify-content:center;">
                    Entrar
                </button>
            </div>
            <div style="text-align:center;margin-top:1rem">
                <a th:href="@{/recuperar-senha}" style="font-size:.82rem;color:var(--blue);">
                    Esqueci minha senha
                </a>
            </div>
        </form>

        <div style="border-top:1px solid var(--gray-100);margin-top:1.5rem;padding-top:1.25rem;text-align:center;">
            <p style="font-size:.85rem;color:var(--gray-400);margin-bottom:.75rem;">Não é cadastrado?</p>
            <a th:href="@{/cadastro}" class="btn btn--outline" style="width:100%;justify-content:center;display:flex;gap:.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                Crie seu usuário
            </a>
        </div>
    </div>

    <div class="login-footer bilca-about">© 2025 Bilca Systems</div>
</div>

<!-- Modal Sobre a Bilca -->
<div id="bilcaAboutModal" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-about">
        <button type="button" class="modal-about__close" aria-label="Fechar">✕</button>
        <div class="modal-about__header">
            <img th:src="@{/bilca-logo.png}" alt="Bilca" class="modal-about__logo"/>
            <div class="modal-about__name">Bilca Systems</div>
        </div>
        <div class="modal-about__by">by Ademir Miguel Evaristo Junior</div>
        <div class="modal-about__contacts">
            <a href="https://wa.me/5511945816565" target="_blank" rel="noopener" class="modal-about__contact">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                +55 (11) 94581-6565
            </a>
            <a href="mailto:ademirjunior@msn.com" class="modal-about__contact">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                ademirjunior@msn.com
            </a>
        </div>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
