<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title th:text="${lista.nome}">Lista</title></head>
<body>
<main layout:fragment="content">

    <div class="page-header">
        <div>
            <h1 class="page-title">🛒 <span th:text="${lista.nome}"></span></h1>
            <p class="page-subtitle">
                <a th:href="@{/}" class="breadcrumb">Dashboard</a>
                <span> › </span>
                <a th:href="@{/compras}" class="breadcrumb">Listas de Compras</a>
                <span> › </span>
                <span th:text="${lista.nome}"></span>
            </p>
        </div>
        <a th:href="@{/compras}" class="btn btn--ghost">← Voltar</a>
    </div>

    <div th:if="${sucesso}" class="alert alert--success" th:text="${sucesso}"></div>
    <div th:if="${erro}"    class="alert alert--danger"  th:text="${erro}"></div>

    <!-- Progresso -->
    <div class="card-item" style="margin-bottom:1.5rem;padding:1rem 1.25rem;">
        <div class="card-item__progress">
            <div class="progress-bar">
                <div class="progress-bar__fill"
                     th:style="'width:' + (${total} > 0 ? (${comprados} * 100 / ${total}) : 0) + '%'"></div>
            </div>
            <span class="progress-bar__label"
                  th:text="${comprados} + ' de ' + ${total} + ' itens comprados'"></span>
        </div>
    </div>

    <!-- Formulário de novo item -->
    <div class="table-wrapper" style="margin-bottom:1.5rem;padding:1rem 1.25rem;">
        <div style="font-size:.85rem;font-weight:600;color:var(--gray-400);text-transform:uppercase;
                    letter-spacing:.05em;margin-bottom:.75rem;">Adicionar item</div>
        <form th:action="@{/compras/{id}/itens(id=${lista.id})}" th:object="${novoItem}" method="post">
            <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:.5rem;align-items:end;">
                <div class="form-group form-group--float" style="margin:0;">
                    <input type="text" id="produto" th:field="*{produto}" class="form-control" placeholder=" " required/>
                    <label class="form-label" for="produto">Produto *</label>
                </div>
                <div class="form-group form-group--float" style="margin:0;">
                    <input type="number" id="quantidade" th:field="*{quantidade}" class="form-control"
                           placeholder=" " min="0" step="0.001"/>
                    <label class="form-label" for="quantidade">Qtd.</label>
                </div>
                <div class="form-group form-group--float" style="margin:0;">
                    <select id="unidade" th:field="*{unidade}" class="form-control form-control--select">
                        <option th:each="u : ${unidades}" th:value="${u}" th:text="${u.label}"></option>
                    </select>
                    <label class="form-label" for="unidade">Unidade</label>
                </div>
                <div class="form-group form-group--float" style="margin:0;">
                    <select id="categoria" th:field="*{categoria}" class="form-control form-control--select">
                        <option th:each="c : ${categorias}" th:value="${c}" th:text="${c.label}"></option>
                    </select>
                    <label class="form-label" for="categoria">Categoria</label>
                </div>
                <button type="submit" class="btn btn--primary">+ Adicionar</button>
            </div>
        </form>
    </div>

    <!-- Lista de itens -->
    <div th:if="${#lists.isEmpty(itens)}" class="alert alert--info">
        Nenhum item ainda. Adicione o primeiro item acima.
    </div>

    <div class="table-wrapper" th:if="${!#lists.isEmpty(itens)}">
        <table class="table">
            <thead>
                <tr>
                    <th style="width:40px;"></th>
                    <th>Produto</th>
                    <th>Qtd.</th>
                    <th>Categoria</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${itens}"
                    th:classappend="${item.comprado} ? 'item-comprado' : ''">
                    <td>
                        <a th:href="@{/compras/{lid}/itens/{iid}/toggle(lid=${lista.id},iid=${item.id})}"
                           class="checkbox-toggle"
                           th:classappend="${item.comprado} ? ' checked' : ''"
                           title="Marcar/desmarcar como comprado">
                            <span th:text="${item.comprado} ? '✓' : ''"></span>
                        </a>
                    </td>
                    <td>
                        <span th:classappend="${item.comprado} ? 'riscado' : ''"
                              th:text="${item.produto}"></span>
                    </td>
                    <td>
                        <span th:if="${item.quantidade != null}"
                              th:text="${item.quantidade % 1 == 0 ?
                                        #numbers.formatInteger(item.quantidade, 1) :
                                        #numbers.formatDecimal(item.quantidade, 1, 3)} + ' ' + ${item.unidade.label}">
                        </span>
                        <span th:if="${item.quantidade == null}" class="text-muted">—</span>
                    </td>
                    <td>
                        <span class="badge" th:text="${item.categoria.label}"
                              th:classappend="${item.categoria.name() == 'CARNES'}     ? ' badge--urgente'   :
                                             (${item.categoria.name() == 'HORTIFRUTI'} ? ' badge--concluida' :
                                             (${item.categoria.name() == 'BEBIDAS'}   ? ' badge--andamento' :
                                              ' badge--pendente'))"></span>
                    </td>
                    <td>
                        <div class="table__actions">
                            <a th:href="@{/compras/{lid}/itens/{iid}/editar(lid=${lista.id},iid=${item.id})}"
                               class="btn btn--sm btn--edit">✏️ Editar</a>
                            <a th:href="@{/compras/{lid}/itens/{iid}/excluir(lid=${lista.id},iid=${item.id})}"
                               class="btn btn--sm btn--danger"
                               onclick="return confirm('Remover este item?')">🗑️</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</main>
</body>
</html>
