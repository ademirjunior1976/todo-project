<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Editar Item</title></head>
<body>
<main layout:fragment="content">

    <div class="page-header">
        <div>
            <h1 class="page-title">✏️ Editar Item</h1>
            <p class="page-subtitle">
                <a th:href="@{/}" class="breadcrumb">Dashboard</a> ›
                <a th:href="@{/compras}" class="breadcrumb">Listas de Compras</a> ›
                <a th:href="@{/compras/{id}(id=${lista.id})}" class="breadcrumb" th:text="${lista.nome}"></a> ›
                Editar Item
            </p>
        </div>
    </div>

    <div class="table-wrapper" style="max-width:560px;padding:1.5rem;">
        <form th:action="@{/compras/{lid}/itens/{iid}/salvar(lid=${lista.id},iid=${itemForm.id})}"
              th:object="${itemForm}" method="post">

            <div class="form-group form-group--float">
                <input type="text" id="produto" th:field="*{produto}" class="form-control" placeholder=" " required/>
                <label class="form-label" for="produto">Nome do produto *</label>
                <span th:if="${#fields.hasErrors('produto')}" class="form-error" th:errors="*{produto}"></span>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;">
                <div class="form-group form-group--float">
                    <input type="number" id="quantidade" th:field="*{quantidade}" class="form-control"
                           placeholder=" " min="0" step="0.001"/>
                    <label class="form-label" for="quantidade">Quantidade</label>
                </div>
                <div class="form-group form-group--float">
                    <select id="unidade" th:field="*{unidade}" class="form-control form-control--select">
                        <option th:each="u : ${unidades}" th:value="${u}" th:text="${u.label}"></option>
                    </select>
                    <label class="form-label" for="unidade">Unidade</label>
                </div>
            </div>

            <div class="form-group form-group--float">
                <select id="categoria" th:field="*{categoria}" class="form-control form-control--select">
                    <option th:each="c : ${categorias}" th:value="${c}" th:text="${c.label}"></option>
                </select>
                <label class="form-label" for="categoria">Categoria</label>
            </div>

            <div style="display:flex;gap:.75rem;margin-top:1rem;">
                <button type="submit" class="btn btn--primary" style="flex:1;">Salvar</button>
                <a th:href="@{/compras/{id}(id=${lista.id})}" class="btn btn--ghost">Cancelar</a>
            </div>
        </form>
    </div>

</main>
</body>
</html>
