<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nova senha - Bilca Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--gray-50); }
        .login-wrapper { width:100%; max-width:420px; padding:1.5rem; }
        .login-brand { display:flex; align-items:center; justify-content:center; gap:.6rem; margin-bottom:2rem; color:var(--blue); font-size:1.4rem; font-weight:700; }
        .login-brand__icon { background:var(--blue); color:var(--white); border-radius:8px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-size:1rem; }
        .login-card { background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow-md); padding:2rem; }
        .login-card__title { font-size:1.2rem; font-weight:700; color:var(--gray-800); margin-bottom:.25rem; }
        .login-card__subtitle { font-size:.83rem; color:var(--gray-400); margin-bottom:1.75rem; }
        .login-footer { text-align:center; font-size:.78rem; color:var(--gray-400); margin-top:1.5rem; }
        .back-link { display:block; text-align:center; margin-top:1rem; font-size:.82rem; color:var(--blue); }
        .error-box { background:var(--red-light); border-left:4px solid var(--red); border-radius:var(--radius-sm); padding:1.25rem; color:var(--red); }
        .error-box__title { font-weight:700; margin-bottom:.35rem; }
        .error-box__text { font-size:.85rem; line-height:1.6; }
    </style>
</head>
<body>
<div class="login-wrapper">

    <div class="login-brand">
        <div class="login-brand__icon">✓</div>
        <span>Bilca Systems</span>
    </div>

    <div class="login-card">
        <h1 class="login-card__title">Nova senha</h1>

        <!-- Token inválido ou expirado -->
        <div th:if="${tokenInvalido}" class="error-box">
            <p class="error-box__title">Link inválido ou expirado</p>
            <p class="error-box__text">
                Este link de redefinição não é mais válido (expirou em 1 hora).<br/>
                <a th:href="@{/recuperar-senha}" style="color:var(--red);font-weight:600;">
                    Solicite um novo link
                </a>
            </p>
        </div>

        <!-- Formulário de nova senha -->
        <div th:if="${token}">
            <p class="login-card__subtitle">Escolha uma nova senha com pelo menos 6 caracteres.</p>

            <div th:if="${erro}" class="alert"
                 style="background:var(--red-light);color:var(--red);border-left:4px solid var(--red);margin-bottom:1.25rem;padding:.8rem 1.1rem;border-radius:var(--radius-sm);font-size:.875rem;font-weight:500;">
                <span th:text="${erro}"></span>
            </div>

            <form th:action="@{/recuperar-senha/redefinir}" method="post">
                <input type="hidden" name="token" th:value="${token}"/>

                <div class="form-group form-group--float" style="margin-bottom:1.5rem">
                    <div class="pwd-wrapper">
                        <input type="password" id="novaSenha" name="novaSenha"
                               class="form-control"
                               placeholder=" "
                               autocomplete="new-password" required/>
                        <button type="button" class="pwd-toggle" aria-label="Mostrar senha">
                            <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                    <label class="form-label" for="novaSenha">Nova senha</label>
                </div>

                <div class="form-group form-group--float" style="margin-bottom:1.5rem">
                    <div class="pwd-wrapper">
                        <input type="password" id="confirmarSenha" name="confirmarSenha"
                               class="form-control"
                               placeholder=" "
                               autocomplete="new-password" required/>
                        <button type="button" class="pwd-toggle" aria-label="Mostrar senha">
                            <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                    <label class="form-label" for="confirmarSenha">Confirmar senha</label>
                </div>

                <div class="form-actions" style="border-top:none;padding-top:0;margin-top:1.25rem">
                    <button type="submit" class="btn btn--primary" style="width:100%;justify-content:center;">
                        Salvar nova senha
                    </button>
                </div>
            </form>
        </div>
    </div>

    <a th:href="@{/login}" class="back-link">← Voltar para o login</a>
    <div class="login-footer">© 2025 Bilca Systems</div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
