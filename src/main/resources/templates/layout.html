<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title layout:title-pattern="$CONTENT_TITLE - Bilca Systems">Bilca Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<header class="topbar">
    <a th:href="@{/}" class="topbar__brand">
        <img th:src="@{/bilca-logo.png}" alt="Bilca" class="topbar__logo"/>
        <span>Bilca Systems</span>
    </a>
    <nav class="topbar__nav">
        <a th:href="@{/}">Dashboard</a>
        <a th:href="@{/tarefas}">Tarefas</a>
        <a th:href="@{/usuarios}">Usuários</a>
        <span class="topbar__user" sec:authentication="principal.nome"></span>
        <form th:action="@{/logout}" method="post" style="display:inline;margin:0">
            <button type="submit" class="topbar__logout">Sair</button>
        </form>
    </nav>
</header>

<main class="main-content" layout:fragment="content">
</main>

<footer class="footer">
    <span>© 2025 Bilca Systems</span>
</footer>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
