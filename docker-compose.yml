services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: todolist
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obrigatório}
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: postgres -c shared_buffers=128MB -c max_connections=25
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    image: bilca-todo:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 768m
    ports:
      - "80:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/todolist
      DATABASE_USERNAME: ${DB_USER:-postgres}
      DATABASE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obrigatório}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL obrigatório}
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  pgdata:
